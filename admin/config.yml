backend:
  name: git-gateway
  branch: main

# Esto es lo que le dice al CMS que use tu sistema de Identity
identity_url: https://heartfelt-scone-92120d.netlify.app/.netlify/identity

media_folder: "img"
public_folder: "/img"

collections:
  - name: "productos"
    label: "Productos"
    folder: "content/productos"
    create: true
    delete: true
    fields:
      - {label: "Nombre", name: "nombre", widget: "string"}
      - {label: "Precio", name: "precio", widget: "string"}
      - {label: "Imagen", name: "imagen", widget: "image"}
