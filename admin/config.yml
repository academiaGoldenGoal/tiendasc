backend:
  name: git-gateway
  branch: main
  # Eliminamos identity_url, ya que Git Gateway lo detecta automáticamente 
  # mediante el widget que pusimos en index.html

media_folder: "img"
public_folder: "/img"

collections:
  - name: "productos"
    label: "Productos"
    folder: "content/productos"
    create: true
    delete: true
    fields:
      - {label: "Nombre", name: "nombre", widget: "string"}
      - {label: "Precio", name: "precio", widget: "string"}
      - {label: "Imagen", name: "imagen", widget: "image"}
