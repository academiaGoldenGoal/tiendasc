backend:
  name: git-gateway
  branch: main

media_folder: "img"
media_library:
  name: "uploadcare"

collections:
  - name: "productos"
    label: "Productos"
    folder: "content/productos"
    create: true
    delete: true
    fields:
      - {label: "Nombre", name: "nombre", widget: "string"}
      - {label: "Precio", name: "precio", widget: "string"}
      - {label: "Imagen", name: "imagen", widget: "image"}